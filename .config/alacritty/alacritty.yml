# Colors (Material Palenight)
colors:
   # Default colors
   primary:
     background: '0x1E1C31'
     foreground: '0xD8DEE9'

   # Normal colors
   normal:
     black:   '0x3B4252'
     red:     '0xff5370'
     green:   '0xA3BE8C'
     yellow:  '0xEBCB8B'
     blue:    '0x81A1C1'
     magenta: '0xB48EAD'
     cyan:    '0x88C0D0'
     white:   '0xE5E9F0'
     orange:  '0xf78c6c'

   # Bright colors
   bright:
     black:   '0x3B4252'
     red:     '0xff5370'
     green:   '0xA3BE8C'
     yellow:  '0xEBCB8B'
     blue:    '0x81A1C1'
     magenta: '0xB48EAD'
     cyan:    '0x88C0D0'
     white:   '0xE5E9F0'
     orange:  '0xf78c6c'

font:
  size: 13
  normal:
    family: JetBrainsMono Nerd Font Mono
    # family: FuraCode Nerd Font Mono  
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font Mono
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font Mono
    style: Italic
  offset:
    x: 0
    y: 1  

window:
  padding:
    x: 16
    y: 16
    decorations: buttonless

scrolling:
  multiplier: 6
  history: 10000

background_opacity: 1.0
